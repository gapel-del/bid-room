<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bid Room · CapitalProjectOS</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 940 940'%3E%3Cg fill='%231a91a5' transform='translate(233.5 73.5)'%3E%3Cpath d='M236.5 0 L291 92 L273 152 L273 684 L291 718 L236.5 793 L182 718 L200 684 L200 152 L182 92 Z'/%3E%3Cpath d='M0 175 L73 247 L73 684 L0 684 Z'/%3E%3Cpath d='M473 175 L400 247 L400 684 L473 684 Z'/%3E%3Cpath d='M73 332 C112 392 155 442 200 464 L200 545 C150 522 105 472 73 422 Z'/%3E%3Cpath d='M400 332 C361 392 318 442 273 464 L273 545 C323 522 368 472 400 422 Z'/%3E%3C/g%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --blue:#004ddd; --blue-hover:#0040b8; --blue-bg:#e3ecfd; --blue-mid:#78abfd;
  --navy:#000427; --navy2:#0f174c; --ink:#0a0a0a; --bg:#f5f5f5; --card:#ffffff;
  --line:#e2e2e2; --line-dk:#c9c9c9; --slate:#838aa6; --txt:#1e1e1f; --muted:#6b6b6b;
  --teal:#0aa78f; --teal-bg:#dcf5f1; --teal-txt:#085041;
  --amber:#ba7517; --amber-bg:#fdf3e0; --amber-txt:#854f0b;
  --green:#1d7a44; --green-bg:#e3f4ea;
  --red:#c0392b; --red-bg:#fdecea;
  --mono:'SF Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:13px}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--line-dk);border-radius:6px;padding:6px 8px;background:#fff;color:var(--txt)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--blue-mid);outline-offset:0}
a{color:var(--blue);text-decoration:none}

header{background:var(--ink);color:#fff;display:flex;align-items:center;gap:14px;padding:0 20px;height:52px;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:9px;cursor:pointer}
.brand svg{display:block}
.brand-name{font-weight:600;font-size:14px;letter-spacing:.12em}
.brand-sub{color:var(--slate);font-size:10.5px;letter-spacing:.05em;margin-left:2px;padding-left:12px;border-left:1px solid #2c2c2c}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.hdr-btn{color:#e9e9e9;font-size:12.5px;border:1px solid #333;border-radius:6px;padding:5px 11px;display:flex;align-items:center;gap:6px}
.hdr-btn:hover{border-color:#555}
.btn-primary{background:var(--blue);color:#fff;font-weight:600;border-radius:6px;padding:7px 14px;font-size:12.5px}
.btn-primary:hover{background:var(--blue-hover)}
.btn-ghost{border:1px solid var(--line-dk);border-radius:6px;padding:6px 12px;color:var(--txt);font-weight:500;background:#fff}
.btn-ghost:hover{border-color:var(--slate)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#555}
.live-dot.on{background:#35d07f;box-shadow:0 0 6px #35d07f}

.wrap{max-width:1180px;margin:0 auto;padding:22px 20px 60px}
.crumb{font-size:12px;color:var(--muted);margin-bottom:14px}
.crumb a{color:var(--muted)}
.crumb a:hover{color:var(--blue)}
h1{font-size:20px;font-weight:650;color:var(--navy);letter-spacing:-.01em}
h2{font-size:15px;font-weight:600;color:var(--navy2);margin-bottom:10px}
.pagehead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.subline{color:var(--muted);font-size:12.5px;margin-bottom:18px}

.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2.5px 9px;border-radius:999px;white-space:nowrap;letter-spacing:.01em}
.chip.mine{background:var(--amber-bg);color:var(--amber-txt)}
.chip.plant{background:var(--teal-bg);color:var(--teal-txt)}
.chip.site{background:var(--blue-bg);color:var(--navy2)}
.chip.status-level{background:var(--blue-bg);color:var(--blue)}
.chip.status-clarify{background:var(--amber-bg);color:var(--amber)}
.chip.status-due{background:#ededed;color:var(--muted)}
.chip.status-awarded{background:var(--green-bg);color:var(--green)}
.chip.flag{background:var(--red-bg);color:var(--red)}
.chip.ok{background:var(--green-bg);color:var(--green)}
.chip.sel{background:var(--navy2);color:#fff}
.chip.clickable{cursor:pointer;border:1px solid transparent}
.chip.clickable:not(.sel):not(.mine):not(.plant){background:#fff;border-color:var(--line-dk);color:var(--muted)}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.kpi .lbl{font-size:11px;color:var(--muted);letter-spacing:.02em;margin-bottom:2px}
.kpi .val{font-size:22px;font-weight:650;color:var(--navy)}
.kpi .delta{font-size:11px;font-weight:600}
.kpi .delta.good{color:var(--green)}

.card{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
table.list{width:100%;border-collapse:collapse}
table.list th{text-align:left;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.03em;padding:10px 14px;border-bottom:1px solid var(--line);background:#fafafa}
table.list td{padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
table.list tr:last-child td{border-bottom:none}
table.list tr.row{cursor:pointer}
table.list tr.row:hover{background:#f7faff}
.pkg-name{font-weight:600;color:var(--navy)}
.td-sub{font-size:11.5px;color:var(--muted)}

.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filters .sep{width:1px;height:16px;background:var(--line-dk);margin:0 4px}

.tabs{display:flex;gap:2px;border-bottom:2px solid var(--line);margin:18px 0 16px}
.tab{padding:8px 16px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.on{color:var(--blue);border-color:var(--blue)}
.tab:hover:not(.on){color:var(--navy2)}
.tab .badge{background:#ededed;color:var(--muted);border-radius:999px;font-size:10.5px;padding:1px 6px;margin-left:5px}
.tab.on .badge{background:var(--blue-bg);color:var(--blue)}

.vendor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px}
.vcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px}
.vcard .vname{font-weight:650;color:var(--navy);font-size:13.5px}
.vcard .vmeta{font-size:11.5px;color:var(--muted);margin:2px 0 10px}
.vrow{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0}
.vrow .k{color:var(--muted)}
.vrow .v{font-weight:600;color:var(--txt)}
.vfoot{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.via{font-size:11px;color:var(--slate)}

.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.split{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px}
.panel h3{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}

.field{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;font-size:12.5px}
.field:hover{background:#f5f8ff}
.field.hl{background:var(--blue-bg)}
.field .fk{color:var(--muted);width:118px;flex-shrink:0}
.field .fv{font-weight:600;flex:1;cursor:pointer;border-bottom:1px dotted var(--line-dk)}
.field .fv:hover{color:var(--blue)}
.conf{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conf.hi{background:#35d07f}
.conf.md{background:#f3b23a}
.conf.lo{background:var(--red)}
.vfy{font-size:11px;color:var(--green);font-weight:600}
.vfy.no{color:var(--amber)}

.doc{font-family:var(--mono);font-size:11.5px;line-height:1.75;background:#fbfbf9;border:1px solid var(--line);border-radius:8px;padding:14px;white-space:pre-wrap;max-height:430px;overflow-y:auto;color:#333}
.doc .src{background:#fff3c4;border-radius:3px;padding:0 2px}
.doc .src.on{background:#ffd54f;outline:2px solid #f3b23a}
.doc-hdr{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;gap:8px;align-items:center}

.rfi{border:1px solid var(--line);border-radius:10px;background:var(--card);margin-bottom:12px;overflow:hidden}
.rfi-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.rfi-head:hover{background:#fafafa}
.rfi-q{font-weight:600;color:var(--navy);font-size:13px;flex:1}
.rfi-body{border-top:1px solid var(--line);padding:14px;display:none}
.rfi.open .rfi-body{display:block}
.msg{max-width:82%;border-radius:10px;padding:9px 12px;font-size:12.5px;margin-bottom:8px}
.msg.us{background:var(--blue-bg);color:var(--navy2);margin-left:auto}
.msg.them{background:#f1f1f1}
.msg .who{font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:2px;letter-spacing:.02em}
.auto-tag{font-size:10px;background:var(--navy2);color:#fff;border-radius:4px;padding:1px 6px;font-weight:600;letter-spacing:.03em}

table.lvl{width:100%;border-collapse:collapse;font-size:12.5px}
table.lvl th{font-size:12px;font-weight:650;color:var(--navy);padding:9px 10px;text-align:right;border-bottom:2px solid var(--line-dk);white-space:nowrap}
table.lvl th:first-child{text-align:left}
table.lvl td{padding:7.5px 10px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
table.lvl td:first-child{text-align:left;color:var(--muted)}
table.lvl tr.total td{font-weight:700;color:var(--navy);border-top:2px solid var(--line-dk);border-bottom:2px solid var(--line-dk);background:#fafcff;font-size:13px}
table.lvl td.gap{background:var(--red-bg);color:var(--red);font-weight:600}
table.lvl td.best{color:var(--green);font-weight:700}
table.lvl th.rec{color:var(--blue)}
table.lvl td.excl,table.lvl th.excl{opacity:.32}
.src-ico{font-size:10px;color:var(--blue);cursor:pointer;margin-left:3px}
.cell-note{display:block;font-size:10px;color:var(--muted);font-weight:400}

.assump{display:flex;flex-wrap:wrap;gap:14px;align-items:center;font-size:12px;color:var(--muted);margin:14px 0;padding:12px 14px;background:#fafafa;border:1px solid var(--line);border-radius:8px}
.assump label{display:flex;align-items:center;gap:6px;font-weight:500}
.assump input[type=number]{width:70px;padding:3px 6px;font-size:12px}
.wrow{display:flex;align-items:center;gap:8px;font-size:12px}
.wrow input[type=range]{width:90px;accent-color:var(--blue)}
.wrow .wv{font-weight:700;color:var(--navy);width:24px}

.recbox{background:var(--blue-bg);border-left:3px solid var(--blue);padding:13px 16px;font-size:13px;color:var(--navy2);border-radius:0 8px 8px 0;margin-top:14px}
.recbox b{color:var(--blue)}

.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--navy);color:#fff;border-radius:8px;padding:11px 16px;font-size:12.5px;box-shadow:0 6px 20px rgba(0,0,0,.25);display:flex;gap:10px;align-items:center;animation:slidein .25s ease}
.toast .tico{color:var(--teal)}
@keyframes slidein{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}

.modal-bg{position:fixed;inset:0;background:rgba(0,4,39,.45);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:34px 16px;overflow-y:auto}
.modal{background:var(--bg);border-radius:12px;max-width:1060px;width:100%;padding:20px 22px;position:relative}
.modal-x{position:absolute;top:14px;right:16px;font-size:18px;color:var(--muted);padding:4px 8px}
.modal-x:hover{color:var(--navy)}

.audit{font-size:12px}
.audit-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}
.audit-row:last-child{border:none}
.audit-t{color:var(--muted);font-family:var(--mono);font-size:11px;width:118px;flex-shrink:0}
.audit-w{font-weight:600;color:var(--navy2);width:88px;flex-shrink:0}

.live-panel{position:fixed;top:52px;right:0;bottom:0;width:360px;background:#fff;border-left:1px solid var(--line-dk);z-index:60;padding:18px;overflow-y:auto;box-shadow:-8px 0 24px rgba(0,0,0,.07)}
.qrbox{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px}
#qr img,#qr canvas{border-radius:4px}
.lvbid{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12.5px}
.raw{font-family:var(--mono);font-size:11px;background:#fbfbf9;border-radius:6px;padding:8px;margin:6px 0;white-space:pre-wrap;color:#444;max-height:110px;overflow-y:auto}
.extract-anim{color:var(--blue);font-weight:600;font-size:11.5px}
.pulse{animation:pulse 1.1s infinite}
@keyframes pulse{50%{opacity:.35}}
.bubble{background:var(--blue-bg);border-radius:12px 12px 12px 4px;padding:10px 12px;font-size:12.5px;color:var(--navy2);max-width:540px;line-height:1.55}
.ch{font-size:10px;font-weight:700;letter-spacing:.06em;border-radius:4px;padding:2px 7px}
.ch.email{background:#ededed;color:var(--muted)}
.ch.text{background:var(--blue-bg);color:var(--blue)}
.ch.vm{background:var(--amber-bg);color:var(--amber)}
.ch.upload{background:var(--teal-bg);color:var(--teal-txt)}
.icard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.icard.done{opacity:.62}
.iclass{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fafafa;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:10px;font-size:12px}
.iactions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;align-items:center}
.lform label{display:block;font-size:12px;font-weight:700;color:var(--navy2);margin:12px 0 5px}
.lform input[type=text],.lform select,.lform textarea{width:100%}
.lform textarea{min-height:90px}
.srcpick{display:flex;gap:6px;flex-wrap:wrap}
.srcpick .chip{cursor:pointer;border:1px solid var(--line-dk);background:#fff;color:var(--muted)}
.srcpick .chip.on{background:var(--navy2);color:#fff;border-color:var(--navy2)}
.evid{font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px}
.evid.verbatim{background:var(--teal-bg);color:var(--teal-txt)}
.evid.recalled{background:var(--amber-bg);color:var(--amber)}
.lvledit{width:88px;text-align:right;border:1px solid transparent;background:transparent;font:inherit;font-size:12.5px;padding:2px 4px;border-radius:4px}
.lvledit:hover,.lvledit:focus{border-color:var(--line-dk);background:#fff}
.lvledit.ov{background:var(--amber-bg);border-color:var(--amber);font-weight:700}
.emptybox{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}
.footnote{font-size:11px;color:var(--slate);margin-top:8px}
.kbd{font-family:var(--mono);font-size:10.5px;background:#eee;border:1px solid var(--line-dk);border-radius:4px;padding:0 5px}
</style>
</head>
<body>
<header>
  <div class="brand" onclick="go('dash')">
    <svg width="15" height="25" viewBox="0 0 473 793"><g fill="#1a91a5"><path d="M236.5 0 L291 92 L273 152 L273 684 L291 718 L236.5 793 L182 718 L200 684 L200 152 L182 92 Z"/><path d="M0 175 L73 247 L73 684 L0 684 Z"/><path d="M473 175 L400 247 L400 684 L473 684 Z"/><path d="M73 332 C112 392 155 442 200 464 L200 545 C150 522 105 472 73 422 Z"/><path d="M400 332 C361 392 318 442 273 464 L273 545 C323 522 368 472 400 422 Z"/></g></svg>
    <span class="brand-name">BID ROOM</span>
    <span class="brand-sub">CapitalProjectOS</span>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" onclick="logItem()">+ Log item</button>
    <button class="hdr-btn" onclick="go('intake')">Intake review <span id="intakeBadge" style="background:var(--blue);color:#fff;border-radius:999px;font-size:10px;padding:1px 7px;font-weight:700">4</span></button>
    <button class="hdr-btn" onclick="toggleLive()"><span class="live-dot" id="liveDot"></span> Live intake</button>
    <button class="btn-primary" onclick="toast('New RFQ creation is post-MVP – see roadmap','info')">+ New RFQ</button>
  </div>
</header>
<div class="wrap" id="app"></div>
<div class="toast-wrap" id="toasts"></div>
<div id="livePanel" class="live-panel" style="display:none"></div>
<div id="modalRoot"></div>
<script>
/* ============ CONFIG ============ */

   Example: const LIVE_DB_URL = "https://bidroom-demo-default-rtdb.firebaseio.com";

/* ============ SEED DATA ============ */

const fmtK = d => '$' + Math.round(d/1000).toLocaleString() + 'k';

          exceptions:[], fx:0,
          doc:`From: j.reyes@vantherm.com\nTo: bids@mariana.io\nSubject: RE: RFQ PKG-L1-210 – Firm Proposal Rev B\n\nPer your clarification CL-003, we confirm the following:\n\n[s1]Total firm lump sum price: USD 3,120,000[/s1]\n[s2]Delivered DDP Lithium One site, Joaquin TX. All freight,\nduties and unloading included.[/s2]\n[s3]Includes recommended 2-year operating spares package\n(ref. Annex C).[/s3]\n[s4]Scope per RFQ Section 3 in full, including skid-mounted\nvacuum system, interconnecting piping and instrumentation.[/s4]\n[s5]Delivery: 30 weeks ex-works from PO, firm.[/s5]\n[s6]Proposal validity: 120 days from this date.[/s6]\n[s7]Payment: 20% on PO / 70% milestones / 10% at FAT.[/s7]\n[s8]Wetted parts titanium Gr.2 per spec MTL-armor-04.[/s8]\n\nUS-based field service team available for commissioning\nsupport at published day rates.\n\nJulia Reyes – VP Sales, Vantherm Process Systems`},
        { id:'coastal', vendor:'Coastal Evaporation Co.', loc:'Baton Rouge, LA', rev:'B', via:'Email · Excel + PDF',
          fields:{
            base:{v:2680000, cur:'USD', conf:'hi', vfy:true, src:'s1', label:'$2,680,000'},
            incoterms:{v:'EXW Baton Rouge', conf:'hi', vfy:true, src:'s2'},
            freight:{v:145000, note:'estimate, 14 loads OD', conf:'md', vfy:false, src:'s2'},
            spares:{v:92000, note:'quoted option, not incl.', conf:'hi', vfy:true, src:'s3'},
            scope:{v:0, note:'vacuum system included', conf:'hi', vfy:true, src:'s4'},
            lead:{v:44, conf:'hi', vfy:true, src:'s5'},
            validity:{v:'90 days', conf:'hi', vfy:true, src:'s6'},
            payment:{v:'40% down / 60% delivery', conf:'hi', vfy:true, src:'s7'},
            materials:{v:'Duplex 2205 (conf. via CL-001)', conf:'hi', vfy:true, src:'s8'}

/* ============ LEVELING ENGINE ============ */
function levelBid(b) {
  const cur = b.fields.base.cur || 'USD';
  const rate = cur === 'EUR' ? S.eurRate : 1;
  const ov = S.overrides[b.id] || {};
  const g = k => (ov[k] !== undefined ? ov[k] : (b.fields[k].v || 0));
  const baseUSD = g('base') * rate;
  const freight = g('freight');
  const spares = S.inclSpares ? g('spares') : 0;
  const scope = g('scope');
  const fxRisk = cur === 'EUR' ? Math.round(baseUSD * S.hedgePct / 100) : 0;
  const total = baseUSD + freight + spares + scope + fxRisk;
  const lowConf = Object.values(b.fields).filter(f => f.conf !== 'hi').length;
  return { baseUSD, freight, spares, scope, fxRisk, total, lead: g('lead'), exc: b.exceptions.length, lowConf };
}
function levelAll(p) {
  const rows = p.bids.map(b => ({ b, L: levelBid(b), incl: !S.excluded[b.id] }));
  const inc = rows.filter(r => r.incl);
  if (inc.length) {
    const minT = Math.min(...inc.map(r => r.L.total));
    const minLead = Math.min(...inc.map(r => r.L.lead));
    const wsum = S.weights.c + S.weights.s + S.weights.r;
    rows.forEach(r => {
      const cs = minT / r.L.total * 100;
      const ss = minLead / r.L.lead * 100;
      const rs = Math.max(0, 100 - 18 * r.L.exc - 6 * r.L.lowConf);
      r.score = Math.round((S.weights.c * cs + S.weights.s * ss + S.weights.r * rs) / wsum);
      r.cs = Math.round(cs); r.ss = Math.round(ss); r.rs = Math.round(rs);
    });
  }
  const ranked = inc.slice().sort((a, b2) => b2.score - a.score);
  return { rows, rec: ranked[0], second: ranked[1], minT: inc.length ? Math.min(...inc.map(r => r.L.total)) : 0 };
}
function recText(lv) {
  if (!lv.rec) return 'No bids included in leveling.';
  const r = lv.rec, cheapest = lv.rows.filter(x => x.incl).sort((a, b) => a.L.total - b.L.total)[0];
  let t = `<b>Recommendation: ${esc(r.b.vendor)}</b> – weighted score ${r.score} (cost ${r.cs} · schedule ${r.ss} · risk ${r.rs}).`;
  if (r !== cheapest) {
    const prem = r.L.total - cheapest.L.total, wks = cheapest.L.lead - r.L.lead;
    t += ` The ${fmtK(prem)} (${(prem / cheapest.L.total * 100).toFixed(1)}%) premium over ${esc(cheapest.b.vendor)} buys ${wks} weeks on the critical path`;
    t += r.L.exc === 0 ? ' with zero open exceptions.' : '.';
  } else {
    t += ' Lowest leveled cost' + (r.L.exc === 0 ? ' with zero open exceptions.' : ` carrying ${r.L.exc} open exception(s).`);
  }
  t += ' <span style="color:var(--muted)">Recomputed live from assumptions and weights below.</span>';
  return t;
}

/* deterministic "AI" extraction – regex keyword spotting over free text */
function extractFields(raw) {
  const t = raw.replace(/ /g, ' ');
  const out = {}; const missing = [];
  const cur = /€|\bEUR\b/i.test(t) ? 'EUR' : 'USD';
  let price = null;
  const pm = t.match(/(?:USD|EUR|\$|€)\s?([\d.,]+)\s?(million|mm?|k|thousand)?/i) || t.match(/([\d.,]+)\s?(million|mm?|k)\b/i);
  if (pm) {
    let n = parseFloat(pm[1].replace(/,/g, ''));
    const unit = (pm[2] || '').toLowerCase();
    if (unit.startsWith('m')) n *= 1e6; else if (unit === 'k' || unit === 'thousand') n *= 1e3;
    if (n < 1000) n *= 1e6;
    price = Math.round(n);
  }
  out.base = price ? { v: price, cur, conf: 'hi', vfy: false, label: (cur === 'EUR' ? '€' : '$') + price.toLocaleString() } : (missing.push('base price'), { v: 0, cur, conf: 'lo', vfy: false, label: 'not found' });
  const inco = t.match(/\b(EXW|FOB|CIF|CFR|DAP|DDP|FCA)\b/i);
  out.incoterms = inco ? { v: inco[1].toUpperCase(), conf: 'hi', vfy: false } : (missing.push('Incoterms'), { v: 'not stated', conf: 'lo', vfy: false });
  const incoU = inco ? inco[1].toUpperCase() : '';
  out.freight = ['DDP', 'DAP'].includes(incoU) ? { v: 0, note: 'included (' + incoU + ')', conf: 'hi', vfy: false } : { v: 130000, note: 'estimated – ' + (incoU || 'terms unknown'), conf: 'md', vfy: false };
  const spIncl = /spares?[^.]{0,40}(includ|incl\b)/i.test(t);
  const spM = t.match(/spares?[^.]{0,40}?\$?([\d,]+)\s?k?/i);
  out.spares = spIncl ? { v: 0, note: 'included', conf: 'hi', vfy: false } : spM ? { v: (x => x < 1000 ? x * 1000 : x)(parseFloat(spM[1].replace(/,/g, ''))), note: 'quoted option', conf: 'md', vfy: false } : (missing.push('spares'), { v: 90000, note: 'not stated – placeholder', conf: 'lo', vfy: false });
  const exc = [];
  (t.match(/[^.]*\b(exclud\w+|not includ\w+|by others)\b[^.]*/gi) || []).forEach(s => exc.push(s.trim().slice(0, 110)));
  out.scope = exc.length ? { v: 240000, note: 'detected exclusion – est. adder, edit in leveling', conf: 'md', vfy: false } : { v: 0, note: 'no exclusions detected', conf: 'md', vfy: false };
  const lead = t.match(/(\d{1,3})\s*(?:weeks?|wks?|semanas)/i);
  out.lead = lead ? { v: +lead[1], conf: 'hi', vfy: false } : (missing.push('lead time'), { v: 40, conf: 'lo', vfy: false });
  const val = t.match(/valid\w*[^\d]{0,10}(\d{1,3})\s*days/i);
  out.validity = val ? { v: val[1] + ' days', conf: 'hi', vfy: false } : (missing.push('validity'), { v: 'not stated', conf: 'lo', vfy: false });
  const pay = t.match(/(\d{1,2}\s*\/\s*\d{1,2}\s*\/\s*\d{1,2}|\d{1,2}%\s*(?:down|with order|anticipo)[^.]{0,40})/i);
  out.payment = pay ? { v: pay[1], conf: 'md', vfy: false } : { v: 'not stated', conf: 'lo', vfy: false };
  out.materials = { v: 'not stated – RFI', conf: 'lo', vfy: false };
  return { fields: out, exceptions: exc, missing };
}
function extractLive(i) {
  const lb = S.liveBids[i];
  lb.extracting = true; renderLive();
  setTimeout(() => {
    const ex = extractFields(lb.raw);
    const p = crys();
    const id = 'live' + Date.now();
    const doc = `From: ${lb.name || 'panelist'} <live-demo>\nReceived: ${lb.t} via Bid Room live intake\n\n` + lb.raw;
    p.bids.push({ id, vendor: lb.company || lb.name || 'Live vendor', loc: 'Live submission', rev: 'A', via: 'Live intake · free text', live: true, fields: ex.fields, exceptions: ex.exceptions, fx: 0, doc, revHistory: [{ rev: 'A', t: 'Jul 10, ' + now(), via: 'Live intake · free text', chg: ['Initial receipt – ' + (ex.missing.length ? ex.missing.length + ' field(s) missing, clarification drafted' : 'all fields extracted') ] }] });

/* Firebase RTDB polling (REST, no SDK) */
async function poll() {
  if (!LIVE_DB_URL) return;
  try {
    const res = await fetch(LIVE_DB_URL.replace(/\/$/, '') + '/bids.json');
    const data = await res.json();
    S.polling = true;
    if (data) Object.entries(data).forEach(([k, v]) => {
      if (!S.seenKeys[k]) {
        S.seenKeys[k] = 1;
        if (!S.bootDone) return;
        ingestLive({ name: v.name, company: v.company, raw: [v.price ? 'Price: ' + v.price : '', v.leadWeeks ? 'Lead time: ' + v.leadWeeks + ' weeks' : '', v.incoterms ? 'Incoterms: ' + v.incoterms : '', v.notes || ''].filter(Boolean).join('. '), t: now() });
      }
    });
  } catch (e) { S.polling = false; }
  $('liveDot').className = 'live-dot' + (S.polling ? ' on' : '');
}

    pushRev(b, 'B', 'Voicemail · auto-transcribed', ['Freight budget $118k→$95k – email confirmation requested']);
    b.fields.freight = { v: 95000, note: 'revised via voicemail', conf: 'md', vfy: false, src: 's9' };
    b.doc += '\n\n– Voicemail transcript (auto) · 0:38 · Jul 10 –\n[s9]"...ocean freight has come down since our offer, we can\nrevise the freight budget from one eighteen down to ninety\nfive thousand US dollars, I will confirm by email..."[/s9]';
    audit(p, 'Nordkessel Rev B ingested from voicemail – freight $118k→$95k; transcript provenance; email confirmation requested');
    it.result = 'Rev B → Nordkessel · PKG-L1-210';
    toast('Nordkessel freight revised to $95k from voicemail – leveling updated', 'bid');
  }
  if (id === 'in4') {
    const sel = $('route_' + id);
    const target = DATA.packages.find(x => x.id === (sel ? sel.value : it.cls.pkg));
    target.audit.push({ t: 'Jul 10, ' + now(), who: 'G. Apel', what: 'First-contact quotation from Halden Machinery routed here from intake – USD 742,000 / 18 wk ex works; queued for extraction into the bid inbox' });
    attachLog(target, it);
    if (target.id === 'crush') target.note = '4 of 4 bids in · 2 open RFIs';
    it.result = 'New bid → ' + target.tagNo;
    toast('Routed to ' + target.name + ' as a new bid – queued for extraction', 'bid');
  }
  if (it.manual) {
    const sel = $('route_' + id);
    const target = DATA.packages.find(x => x.id === (sel ? sel.value : it.cls.pkg));
    if (target) {
      target.audit.push({ t: 'Jul 10, ' + now(), who: 'G. Apel', what: 'Manually logged item routed here from intake – ' + (it.evid || '') + ' ' + (LOG_LABEL[it.ch] || 'item') + ' from ' + it.from });
      attachLog(target, it);
      it.result = 'Routed → ' + target.tagNo;
      toast('Routed to ' + target.name, 'ok');
    }
  }
  it.status = 'accepted';
  render();
}

/* ============ ROOT RENDER ============ */
function render() {
  $('app').innerHTML = S.view === 'dash' ? renderDash() : S.view === 'intake' ? renderIntake() : renderPkg();
  const ib = $('intakeBadge'); if (ib) ib.textContent = S.intake.filter(i => i.status === 'pending').length;
}
render();
</script>
